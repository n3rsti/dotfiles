###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER

source = ~/.config/hypr/path-of-exile.conf


#################
### VARIABLES ###
#################

$terminal    = ghostty
$fileManager = nautilus
$menu        = walker -t launcher
$browser     = firefox
$discord     = discord
$network     = nmgui
$sound       = pavucontrol
$bluetooth   = blueman-manager
$swaync      = swaync-client -t
$resources   = resources -t applications

$btop = ghostty --class=Btop --title=Btop -e btop -l --preset 1


########################
### APPLICATION BINDS ###
########################

bind = $mainMod, T, exec, $terminal
bind = $mainMod, F, exec, $browser
bind = $mainMod, D, exec, $discord
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu

bind = $mainMod, N, exec, $network
bind = $mainMod, S, exec, $sound
bind = $mainMod, B, exec, $bluetooth

bind = $mainMod, escape, exec, $resources
bind = $mainMod, slash,  exec, $swaync
bind = $mainMod, PERIOD, exec, walker -t launcher -m symbols


####################
### SYSTEM BINDS ###
####################

bind  = $mainMod, Q, killactive
bind  = $mainMod, V, togglefloating
bind  = $mainMod, space, exec, hyprctl switchxkblayout current next

bindn = ALT, Tab, exec, ~/.config/dotfiles/scripts/windows-switcher.sh


###################
### SCREENSHOTS ###
###################

bind = , Print, exec, grimblast copysave area
bind = $mainMod, Print, exec, grimblast copysave output

bind = $mainMod, P, exec, grimblast copysave area
bind = $mainMod SHIFT, P, exec, grimblast copysave output
bind = SHIFT ALT, P, exec, bash -c 'sleep 1; grimblast copysave output'


#########################
### WINDOW MANAGEMENT ###
#########################

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Resize
binde = $mainMod SHIFT, right, resizeactive, 10 0
binde = $mainMod SHIFT, left,  resizeactive, -10 0
binde = $mainMod SHIFT, up,    resizeactive, 0 -10
binde = $mainMod SHIFT, down,  resizeactive, 0 10

# Swap
bind = $mainMod CTRL, right, swapactiveworkspaces, 1 0
bind = $mainMod CTRL, left,  swapactiveworkspaces, 0 1
bind = $mainMod CTRL, down,  swapwindow, d
bind = $mainMod CTRL, up,    swapwindow, u

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Dwindle
# bind = $mainMod, J, togglesplit


##################
### WORKSPACES ###
##################

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


###################
### MEDIA KEYS  ###
###################

# Volume
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume=raise --max-volume=150
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume=lower --max-volume=150
bindel = , XF86AudioMute,        exec, swayosd-client --output-volume=mute-toggle --max-volume=150
bindel = , XF86AudioMicMute,     exec, swayosd-client --input-volume=mute-toggle --max-volume=150

# Brightness
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness=+5
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness=-5

# Media playback
bindl = , XF86AudioNext,  exec, swayosd-client --playerctl=next
bindl = , XF86AudioPrev,  exec, swayosd-client --playerctl=previous
bindl = , XF86AudioPlay,  exec, swayosd-client --playerctl=play-pause
bindl = , XF86AudioPause, exec, swayosd-client --playerctl=play-pause

# Keyboard brightness placeholder
bind = , XF86KbdBrightnessUp,   exec, swayosd-client --custom-message=xd --custom-icon=preferences-desktop-keyboard
bind = , XF86KbdBrightnessDown, exec, swayosd-client --custom-message=xd --custom-icon=preferences-desktop-keyboard
